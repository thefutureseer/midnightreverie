kind = "web"
previewPath = "/"
title = "Virtual Stage Show"
version = "1.0.0"
id = "artifacts/theater"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25068

[services.development]
run = "pnpm --filter @workspace/theater run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/theater", "run", "build" ]
publicDir = "artifacts/theater/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25068"
BASE_PATH = "/"
